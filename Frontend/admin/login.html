<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – Mrnobudi</title>
    <link rel="icon" type="image/png" href="../assets/images/HomePage/Logo.png">
    <link rel="stylesheet" href="../css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">

<div class="login-card">
    <div class="logo">Mrnobudi</div>
    <div class="subtitle">Admin Panel – Sign in to continue</div>

    <form id="login-form" autocomplete="off">
        <div class="form-group">
            <label>Username</label>
            <input type="text" class="form-control" id="username" placeholder="admin" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
        <div class="login-error" id="login-error">Invalid username or password.</div>
    </form>
</div>

<script src="../js/config.js"></script>
<script>
    // redirect if already logged in
    if (localStorage.getItem('admin_token')) window.location.href = 'dashboard.html';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('login-btn');
        const err = document.getElementById('login-error');
        btn.textContent = 'Signing in...';
        btn.disabled = true;
        err.style.display = 'none';

        try {
            const res = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('admin_token', data.token);
                window.location.href = 'dashboard.html';
            } else {
                err.style.display = 'block';
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        } catch {
            err.textContent = 'Cannot connect to server.';
            err.style.display = 'block';
            btn.textContent = 'Sign In';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
