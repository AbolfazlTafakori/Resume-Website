<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio – Mrnobudi</title>
    <meta name="description" content="Projects and work by Mrnobudi — Back-end Developer.">
    <link rel="icon" type="image/png" href="../assets/images/HomePage/Logo.png">
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="stylesheet" href="../css/portfolio.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- NAV -->
<header>
    <div class="nav-inner">
        <a href="index.html" class="nav-logo" id="nav-logo">Mrnobudi</a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html" id="nav-home">Home</a></li>
            <li><a href="about.html" id="nav-about">About</a></li>
            <li><a href="portfolio.html" id="nav-portfolio">Portfolio</a></li>
            <li><a href="contact.html" class="btn-talk" id="nav-contact">Let's talk</a></li>
        </ul>
    </div>
</header>

<!-- CONTENT -->
<div class="portfolio-wrap">
    <div class="container">
        <h1 class="page-title reveal" id="page-title">Portfolio</h1>

        <div class="projects" id="projects-list"></div>
    </div>
</div>

<!-- Overview Modal -->
<div class="overview-backdrop" id="overview-backdrop" onclick="closeOverview(event)">
    <div class="overview-panel" id="overview-panel">
        <button class="overview-panel-close" onclick="closeOverview()">&#x2715;</button>
        <div class="overview-panel-title" id="overview-panel-title"></div>
        <div class="overview-panel-text" id="overview-panel-text"></div>
    </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/animations.js"></script>
<script src="../js/portfolio.js"></script>
<script>
    document.getElementById('nav-toggle').addEventListener('click', function() {
        this.classList.toggle('open');
        document.getElementById('nav-links').classList.toggle('open');
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverview({}); });
</script>
</body>
</html>
