<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Page Not Found</title>
    <link rel="icon" type="image/png" href="../assets/images/HomePage/Logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --yellow: #ffe600;
            --cyan:   #00f5ff;
            --pink:   #ff2d9b;
            --purple: #7b2fff;
            --bg:     #050510;
        }

        body {
            font-family: 'Press Start 2P', monospace;
            background: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Starfield ── */
        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--d) infinite ease-in-out;
            animation-delay: var(--delay);
        }
        @keyframes twinkle {
            0%,100% { opacity: 0.2; transform: scale(1); }
            50%      { opacity: 1;   transform: scale(1.6); }
        }

        /* ── Scanlines overlay ── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.18) 2px,
                rgba(0,0,0,0.18) 4px
            );
            pointer-events: none;
            z-index: 10;
        }

        /* ── Main container ── */
        .arcade {
            position: relative;
            z-index: 5;
            text-align: center;
            padding: 20px;
        }

        /* ── GAME OVER ── */
        .game-over {
            font-size: clamp(10px, 3vw, 18px);
            color: var(--pink);
            letter-spacing: 6px;
            text-shadow: 0 0 10px var(--pink), 0 0 30px var(--pink);
            animation: blink-glow 1.1s infinite;
            margin-bottom: 28px;
        }
        @keyframes blink-glow {
            0%,100% { opacity: 1;   text-shadow: 0 0 10px var(--pink), 0 0 30px var(--pink); }
            50%      { opacity: 0.4; text-shadow: none; }
        }

        /* ── 404 big ── */
        .big-404 {
            font-size: clamp(60px, 18vw, 130px);
            line-height: 1;
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
        }
        .big-404 .layer-yellow {
            color: var(--yellow);
            text-shadow: 4px 4px 0 #b8a000, 0 0 40px var(--yellow), 0 0 80px var(--yellow);
            animation: shake 0.12s infinite;
        }
        .big-404 .layer-cyan {
            position: absolute;
            inset: 0;
            color: var(--cyan);
            text-shadow: -4px -4px 0 #007b80;
            opacity: 0.35;
            animation: glitch-cyan 3s infinite;
        }
        .big-404 .layer-pink {
            position: absolute;
            inset: 0;
            color: var(--pink);
            text-shadow: 4px 4px 0 #8b0050;
            opacity: 0.35;
            animation: glitch-pink 3s infinite;
        }
        @keyframes shake {
            0%,100% { transform: translate(0,0); }
            25%      { transform: translate(-1px, 1px); }
            75%      { transform: translate(1px,-1px); }
        }
        @keyframes glitch-cyan {
            0%,90%,100% { transform: translate(0); opacity: 0; }
            91%          { transform: translate(-6px, 2px); opacity: 0.5; }
            93%          { transform: translate(5px,-3px); opacity: 0.3; }
            95%          { transform: translate(0); opacity: 0; }
        }
        @keyframes glitch-pink {
            0%,92%,100% { transform: translate(0); opacity: 0; }
            93%          { transform: translate(6px,-2px); opacity: 0.5; }
            95%          { transform: translate(-4px, 3px); opacity: 0.3; }
            97%          { transform: translate(0); opacity: 0; }
        }

        /* ── Pixel ghost / character ── */
        .ghost {
            font-size: clamp(28px, 8vw, 52px);
            margin: 8px 0 20px;
            animation: float 2.2s ease-in-out infinite;
            display: inline-block;
            filter: drop-shadow(0 0 12px var(--cyan));
        }
        @keyframes float {
            0%,100% { transform: translateY(0) rotate(-5deg); }
            50%      { transform: translateY(-14px) rotate(5deg); }
        }

        /* ── Score/message line ── */
        .msg {
            font-size: clamp(6px, 1.8vw, 11px);
            color: var(--cyan);
            letter-spacing: 2px;
            line-height: 2;
            text-shadow: 0 0 8px var(--cyan);
            margin-bottom: 36px;
        }

        /* ── Pixel progress bar ── */
        .bar-label {
            font-size: 7px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .pixel-bar {
            width: clamp(200px, 50vw, 380px);
            height: 14px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.2);
            margin: 0 auto 32px;
            position: relative;
            overflow: hidden;
        }
        .pixel-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--purple), var(--pink), var(--yellow));
            animation: loading 3.5s ease-in-out infinite;
            box-shadow: 0 0 10px var(--pink);
        }
        @keyframes loading {
            0%   { width: 0%; }
            60%  { width: 100%; }
            80%  { width: 100%; }
            100% { width: 0%; }
        }

        /* ── Insert coin button ── */
        .btn-coin {
            display: inline-block;
            padding: 14px 28px;
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(7px, 1.8vw, 10px);
            color: var(--bg);
            background: var(--yellow);
            border: none;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 1px;
            box-shadow: 4px 4px 0 #8a7900, 0 0 20px var(--yellow);
            transition: transform 0.1s, box-shadow 0.1s;
            animation: pulse-btn 2s ease-in-out infinite;
        }
        .btn-coin:hover {
            transform: translate(2px,2px);
            box-shadow: 2px 2px 0 #8a7900, 0 0 30px var(--yellow);
        }
        @keyframes pulse-btn {
            0%,100% { box-shadow: 4px 4px 0 #8a7900, 0 0 20px var(--yellow); }
            50%      { box-shadow: 4px 4px 0 #8a7900, 0 0 40px var(--yellow), 0 0 60px var(--yellow); }
        }

        /* ── Bottom credits ── */
        .credits {
            position: fixed;
            bottom: 16px;
            font-size: 7px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 2px;
            z-index: 5;
        }

        /* ── Pixel corners decoration ── */
        .corner {
            position: fixed;
            width: 24px; height: 24px;
            border-color: rgba(255,255,255,0.15);
            border-style: solid;
            z-index: 5;
        }
        .corner-tl { top:16px; left:16px;  border-width: 2px 0 0 2px; }
        .corner-tr { top:16px; right:16px; border-width: 2px 2px 0 0; }
        .corner-bl { bottom:16px; left:16px;  border-width: 0 0 2px 2px; }
        .corner-br { bottom:16px; right:16px; border-width: 0 2px 2px 0; }
    </style>
</head>
<body>

<!-- Corner decorations -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Starfield -->
<div class="stars" id="stars"></div>

<div class="arcade">
    <div class="game-over">— GAME OVER —</div>

    <div class="big-404">
        <span class="layer-cyan">404</span>
        <span class="layer-pink">404</span>
        <span class="layer-yellow">404</span>
    </div>

    <div class="ghost">👾</div>

    <div class="msg">
        PAGE NOT FOUND<br>
        THE LEVEL YOU SEEK<br>
        DOES NOT EXIST
    </div>

    <div class="bar-label">SEARCHING FOR PAGE...</div>
    <div class="pixel-bar"><div class="pixel-bar-fill"></div></div>

    <a href="index.html" class="btn-coin">▶ INSERT COIN / GO HOME</a>
</div>

<div class="credits">© MRNOBUDI ARCADE — ALL RIGHTS RESERVED</div>

<script>
    // Generate random stars
    const container = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.cssText = `
            left: ${Math.random()*100}%;
            top:  ${Math.random()*100}%;
            --d: ${1.5 + Math.random()*3}s;
            --delay: ${Math.random()*3}s;
            width: ${Math.random() > 0.8 ? 3 : 2}px;
            height: ${Math.random() > 0.8 ? 3 : 2}px;
        `;
        container.appendChild(s);
    }
</script>
</body>
</html>
